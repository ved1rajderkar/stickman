<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Arena - Fighting Stick Man</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 overflow-hidden select-none">
    <div id="game-container" class="relative w-screen h-screen flex items-center justify-center">
        <canvas id="gameCanvas" class="border-2 border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.4)]"></canvas>
        
        <!-- Main Menu Overlay -->
        <div id="main-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-10">
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 mb-2" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 20px rgba(168,85,247,0.8);">
                COMBAT ARENA
            </h1>
            <p class="text-xl text-purple-300 mb-12" style="font-family: 'Orbitron', sans-serif;">Fighting Stick Man</p>
            
            <div class="flex flex-col gap-4">
                <button id="btn-1v1" class="menu-btn px-8 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(168,85,247,0.6)]" style="font-family: 'Orbitron', sans-serif;">
                    1v1 LOCAL
                </button>
                <button id="btn-vs-cpu" class="menu-btn px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(59,130,246,0.6)]" style="font-family: 'Orbitron', sans-serif;">
                    VS CPU
                </button>
                <button id="btn-survival" class="menu-btn px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(239,68,68,0.6)]" style="font-family: 'Orbitron', sans-serif;">
                    SURVIVAL
                </button>
                <button id="btn-training" class="menu-btn px-8 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(34,197,94,0.6)]" style="font-family: 'Orbitron', sans-serif;">
                    TRAINING
                </button>
                <button id="btn-settings" class="menu-btn px-8 py-3 bg-gray-600 hover:bg-gray-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(107,114,128,0.6)]" style="font-family: 'Orbitron', sans-serif;">
                    SETTINGS
                </button>
            </div>
            
            <p class="mt-12 text-gray-500 text-sm" style="font-family: 'Orbitron', sans-serif;">Press any key to start</p>
        </div>

        <!-- Character Select Overlay -->
        <div id="character-select" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20 hidden">
            <h2 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-8" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 20px rgba(168,85,247,0.8);">
                SELECT FIGHTER
            </h2>
            
            <div class="flex gap-16 items-center">
                <!-- Player 1 Panel -->
                <div class="flex flex-col items-center">
                    <p class="text-red-400 text-xl mb-4 font-bold" style="font-family: 'Orbitron', sans-serif;">PLAYER 1</p>
                    <canvas id="p1-preview" width="120" height="160" class="mb-4"></canvas>
                    <div id="p1-color-grid" class="grid grid-cols-4 gap-2 mb-4">
                    </div>
                    <p id="p1-color-name" class="text-red-300 text-sm" style="font-family: 'Orbitron', sans-serif;">Crimson</p>
                    <div id="p1-weapon-select" class="flex gap-2 mt-4">
                    </div>
                </div>
                
                <!-- VS Text -->
                <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-400 to-orange-500" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 30px rgba(250,204,21,0.8);">
                    VS
                </div>
                
                <!-- Player 2 Panel -->
                <div class="flex flex-col items-center">
                    <p class="text-blue-400 text-xl mb-4 font-bold" style="font-family: 'Orbitron', sans-serif;">PLAYER 2</p>
                    <canvas id="p2-preview" width="120" height="160" class="mb-4"></canvas>
                    <div id="p2-color-grid" class="grid grid-cols-4 gap-2 mb-4">
                    </div>
                    <p id="p2-color-name" class="text-blue-300 text-sm" style="font-family: 'Orbitron', sans-serif;">Cobalt</p>
                    <div id="p2-weapon-select" class="flex gap-2 mt-4">
                    </div>
                </div>
            </div>
            
            <button id="btn-fight" class="mt-8 px-12 py-4 bg-gradient-to-r from-red-600 to-orange-500 text-white text-2xl font-black rounded-lg transition-all duration-200 hover:scale-110 hover:shadow-[0_0_30px_rgba(239,68,68,0.8)] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100" style="font-family: 'Press Start 2P', cursive;" disabled>
                FIGHT!
            </button>
        </div>

        <!-- Stage Select Overlay -->
        <div id="stage-select" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20 hidden">
            <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500 mb-8" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 20px rgba(34,197,94,0.8);">
                SELECT STAGE
            </h2>
            
            <div class="flex gap-8">
                <div id="stage-neon-city" class="stage-card w-64 h-40 bg-gradient-to-br from-purple-900 to-cyan-900 rounded-lg cursor-pointer transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(168,85,247,0.6)] border-2 border-transparent hover:border-purple-400 flex items-center justify-center">
                    <p class="text-white text-xl font-bold" style="font-family: 'Orbitron', sans-serif;">NEON CITY</p>
                </div>
                <div id="stage-blood-dojo" class="stage-card w-64 h-40 bg-gradient-to-br from-red-900 to-orange-900 rounded-lg cursor-pointer transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(239,68,68,0.6)] border-2 border-transparent hover:border-red-400 flex items-center justify-center opacity-50">
                    <p class="text-white text-xl font-bold" style="font-family: 'Orbitron', sans-serif;">BLOOD DOJO 🔒</p>
                </div>
                <div id="stage-cyber-void" class="stage-card w-64 h-40 bg-gradient-to-br from-black to-green-900 rounded-lg cursor-pointer transition-all duration-200 hover:scale-105 hover:shadow-[0_0_20px_rgba(34,197,94,0.6)] border-2 border-transparent hover:border-green-400 flex items-center justify-center opacity-50">
                    <p class="text-white text-xl font-bold" style="font-family: 'Orbitron', sans-serif;">CYBER VOID 🔒</p>
                </div>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div id="pause-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 z-30 hidden">
            <h2 class="text-5xl font-black text-white mb-8" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 20px rgba(255,255,255,0.5);">
                PAUSED
            </h2>
            <div class="flex flex-col gap-4">
                <button id="btn-resume" class="menu-btn px-8 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105" style="font-family: 'Orbitron', sans-serif;">
                    RESUME
                </button>
                <button id="btn-restart" class="menu-btn px-8 py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105" style="font-family: 'Orbitron', sans-serif;">
                    RESTART
                </button>
                <button id="btn-quit" class="menu-btn px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105" style="font-family: 'Orbitron', sans-serif;">
                    QUIT TO MENU
                </button>
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="settings-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-30 hidden">
            <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-8" style="font-family: 'Press Start 2P', cursive;">
                SETTINGS
            </h2>
            
            <div class="grid grid-cols-2 gap-6 max-w-2xl">
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Timer</label>
                    <select id="setting-timer" class="bg-gray-700 text-white px-3 py-1 rounded">
                        <option value="30">30s</option>
                        <option value="60" selected>60s</option>
                        <option value="99">99s</option>
                        <option value="0">Off</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Rounds</label>
                    <select id="setting-rounds" class="bg-gray-700 text-white px-3 py-1 rounded">
                        <option value="1">1</option>
                        <option value="3" selected>3</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Hazards</label>
                    <input type="checkbox" id="setting-hazards" class="w-5 h-5">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Weapon Drops</label>
                    <input type="checkbox" id="setting-weapon-drops" checked class="w-5 h-5">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Screen Shake</label>
                    <input type="checkbox" id="setting-screen-shake" checked class="w-5 h-5">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Blood Effects</label>
                    <input type="checkbox" id="setting-blood" checked class="w-5 h-5">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">Volume</label>
                    <input type="range" id="setting-volume" min="0" max="10" value="7" class="w-24">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-white" style="font-family: 'Orbitron', sans-serif;">AI Difficulty</label>
                    <select id="setting-difficulty" class="bg-gray-700 text-white px-3 py-1 rounded">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
            </div>
            
            <button id="btn-settings-back" class="mt-8 px-8 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg transition-all duration-200 hover:scale-105" style="font-family: 'Orbitron', sans-serif;">
                BACK
            </button>
        </div>

        <!-- Round Announcement Overlay -->
        <div id="round-announcement" class="absolute inset-0 flex items-center justify-center z-25 pointer-events-none hidden">
            <div class="text-center">
                <p id="round-text" class="text-6xl font-black text-white mb-4" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 30px rgba(255,255,255,0.8);"></p>
                <p id="fight-text" class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 40px rgba(239,68,68,0.8);"></p>
            </div>
        </div>

        <!-- KO Screen Overlay -->
        <div id="ko-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 z-25 hidden">
            <p id="ko-text" class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-500 to-red-500 mb-4" style="font-family: 'Press Start 2P', cursive; text-shadow: 0 0 40px rgba(239,68,68,0.8);">
                K.O.!
            </p>
            <p id="ko-subtext" class="text-2xl text-white" style="font-family: 'Orbitron', sans-serif;"></p>
            <p id="ko-special" class="text-xl text-yellow-400 mt-2 hidden" style="font-family: 'Press Start 2P', cursive;"></p>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
